<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sirionex Internship Registration Form</title>
    
    <style>
        /* CSS STYLES */
        :root {
            --bg-dark: #0a0f18;
            --card-bg: #161c27;
            --accent-teal: #00d4ff;
            --text-white: #ffffff;
            --text-gray: #a0aec0;
            --error-red: #ff4d4d;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }

        body {
            background-color: var(--bg-dark);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: var(--text-white);
            padding: 20px;
        }

        .form-container {
            background-color: var(--card-bg);
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 550px; /* Made slightly wider for options */
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .form-header { text-align: center; margin-bottom: 30px; }
        .logo { max-width: 140px; margin-bottom: 15px; }
        .form-header h2 { font-size: 24px; font-weight: 600; margin-bottom: 10px; }

        .input-group { margin-bottom: 20px; position: relative; }
        label { display: block; font-size: 13px; color: var(--text-gray); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }

        input, select {
            width: 100%;
            padding: 12px 16px;
            background: #0d121b;
            border: 1px solid #2d3748;
            border-radius: 6px;
            color: white;
            font-size: 15px;
        }

        input:focus, select:focus { outline: none; border-color: var(--accent-teal); box-shadow: 0 0 8px rgba(0, 212, 255, 0.1); }

        .error-msg { color: var(--error-red); font-size: 11px; display: none; margin-top: 5px; }

        /* Internship Option Styles */
        .options-group { margin-bottom: 25px; }
        .option-item {
            display: flex;
            align-items: center;
            margin-bottom: 10px;
            cursor: pointer;
        }
        .option-item input[type="radio"] {
            width: auto;
            margin-right: 12px;
            cursor: pointer;
            border: 1px solid #2d3748; /* To mimic the image appearance on dark bg */
        }
        .option-item label {
            text-transform: none; /* No uppercase for options */
            font-size: 15px;
            color: var(--text-white);
            margin-bottom: 0;
            display: inline;
        }

        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(90deg, #00d4ff, #0088ff);
            border: none;
            border-radius: 6px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
            font-size: 16px;
            transition: opacity 0.2s;
        }

        button:hover { opacity: 0.9; }

        #form-status { text-align: center; margin-top: 15px; font-size: 14px; min-height: 20px; }
    </style>
</head>
<body>

    <div class="form-container">
        <div class="form-header">
            <img src="https://res.cloudinary.com/dfxba3bva/image/upload/v1777019981/Sirionex_Logo_era0cz_bkrdru.png" alt="Logo" class="logo">
            <h2>Internship Registration</h2>
        </div>

        <form id="registrationForm" action="https://formspree.io/f/mzdyynda" method="POST">
            
            <div class="input-group">
                <label>Full Name</label>
                <input type="text" name="name" required placeholder="John Doe">
                <span class="error-msg">Name is required</span>
            </div>

            <div class="input-group">
                <label>Email Address</label>
                <input type="email" name="email" required placeholder="joindoe@gmail.com">
                <span class="error-msg">Valid email is required</span>
            </div>

            <div class="input-group">
                <label>Phone Number</label>
                <input type="tel" name="phone" required placeholder="+91 XXXXX XXXXX">
            </div>

            <div class="input-group">
                <label>College Name</label>
                <input type="text" name="college_name" required placeholder="University of Example">
            </div>

            <div class="input-group">
                <label>Roll No / Student ID</label>
                <input type="text" name="roll_no" required placeholder="EG1234567">
            </div>

            <div class="input-group">
                <label>Aadhar Number</label>
                <input type="text" name="aadhar_no" required placeholder="XXXX" maxlength="12" minlength="12">
                <span class="error-msg">Enter exactly 12 digits</span>
            </div>

            <div class="options-group input-group">
                <label>Select Internship Position</label>
                <div id="positionsError" class="error-msg" style="margin-bottom: 10px;">Please select a position</div>
                
                <div class="option-item">
                    <input type="radio" id="position1" name="internship_position" value="Business Analyst Intern" required>
                    <label for="position1">Business Analyst Intern</label>
                </div>
                <div class="option-item">
                    <input type="radio" id="position2" name="internship_position" value="Digital Marketing Intern">
                    <label for="position2">Digital Marketing Intern</label>
                </div>
                <div class="option-item">
                    <input type="radio" id="position3" name="internship_position" value="HR & Talent Acquisition Intern">
                    <label for="position3">HR & Talent Acquisition Intern</label>
                </div>
                <div class="option-item">
                    <input type="radio" id="position4" name="internship_position" value="Finance & Accounting Intern">
                    <label for="position4">Finance & Accounting Intern</label>
                </div>
                <div class="option-item">
                    <input type="radio" id="position5" name="internship_position" value="Business Development Associate Intern">
                    <label for="position5">Business Development Associate Intern</label>
                </div>
                <div class="option-item">
                    <input type="radio" id="position6" name="internship_position" value="Python Intern">
                    <label for="position6">Python Intern</label>
                </div>
                <div class="option-item">
                    <input type="radio" id="position7" name="internship_position" value="Java Intern">
                    <label for="position7">Java Intern</label>
                </div>
                <div class="option-item">
                    <input type="radio" id="position8" name="internship_position" value="AIML Intern">
                    <label for="position8">AIML Intern</label>
                </div>
                <div class="option-item">
                    <input type="radio" id="position9" name="internship_position" value="Power Bi with Advanced Excel">
                    <label for="position9">Power Bi with Advanced Excel</label>
                </div>
                <div class="option-item">
                    <input type="radio" id="position10" name="internship_position" value="Full Stack Java Intern">
                    <label for="position10">Full Stack Java Intern</label>
                </div>
                <div class="option-item">
                    <input type="radio" id="position11" name="internship_position" value="Full Stack Python Intern">
                    <label for="position11">Full Stack Python Intern</label>
                </div>
                <div class="option-item">
                    <input type="radio" id="position12" name="internship_position" value="Full Stack MERN Intern">
                    <label for="position12">Full Stack MERN Intern</label>
                </div>
            </div>

            <button type="submit" id="submitBtn">Register Now</button>
            <div id="form-status"></div>
        </form>
    </div>

    <script>
        const form = document.getElementById('registrationForm');
        const status = document.getElementById('form-status');
        const positionsError = document.getElementById('positionsError');

        form.addEventListener('submit', async function(e) {
            e.preventDefault();
            
            // Handle Radio Button Validation
            const selectedPosition = form.querySelector('input[name="internship_position"]:checked');
            if (!selectedPosition) {
                positionsError.style.display = 'block';
                return; // Prevent submission
            } else {
                positionsError.style.display = 'none';
            }

            const formData = new FormData(form);
            
            status.style.color = "var(--text-gray)";
            status.innerText = "Sending your application...";

            fetch(form.action, {
                method: form.method,
                body: formData,
                headers: { 'Accept': 'application/json' }
            })
            .then(response => {
                if (response.ok) {
                    status.style.color = "var(--accent-teal)";
                    status.innerText = "Success! Your application has been sent.";
                    form.reset();
                } else {
                    response.json().then(data => {
                        if (Object.hasOwn(data, 'errors')) {
                            status.style.color = "var(--error-red)";
                            status.innerHTML = data["errors"].map(error => error["message"]).join(", ");
                        } else {
                            status.style.color = "var(--error-red)";
                            status.innerHTML = "Oops! There was a problem submitting your form.";
                        }
                    })
                }
            })
            .catch(error => {
                status.style.color = "var(--error-red)";
                status.innerText = "Connection error, please try again.";
            });
        });

        // Optional: Ensure Aadhar input is only numeric
        const aadharInput = form.querySelector('input[name="aadhar_no"]');
        aadharInput.addEventListener('input', function(e) {
            this.value = this.value.replace(/[^0-9]/g, '');
        });
    </script>
</body>
</html>
